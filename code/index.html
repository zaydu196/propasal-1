<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UrbanDrip Clothing</title>
    <link rel="stylesheet" href="style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
    body {
    font-family: Arial;
    margin: 0;
    background-color: #f4f4f4;
}

header {
    background-color: black;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.hero {
    text-align: center;
    padding: 40px;
    background-color: grey;
    color: white;
}

.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 10px;
    text-align: center;
    border: 1px solid #ccc;
}

footer {
    text-align: center;
    padding: 10px;
    background-color: black;
    color: white;
}
.card p {
    margin: 5px 0;
}

.card p:first-of-type {
    font-weight: bold;
}

@media (max-width: 600px) {


    nav {
        display: flex;
        flex-direction: column;
    }

    nav a {
        margin: 5px 0;
    }


    .hero {
        padding: 30px 10px;
    }

    .hero h2 {
        font-size: 20px;
    }


    .products {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 90%;
    }

   
    section {
        padding: 25px 15px;
    }
}
</style>
<body>

<header>
    <h1>UrbanDrip Clothing</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Fresh Streetwear for Everyone</h2>
    <p>Affordable. Stylish. Trending.</p>
</section>

<section class="featured">
    <h2>Featured Products</h2>
    <div class="products">
        <div class="card">
            <img src="../black hoodie.jpg">
            <p>Black Hoodie</p>
            <h2>$29.99</h2>
        </div>
        <div class="card">
            <img src="../white sneaker.jpg">
            <p>White Sneakers</p>
            <h2>$49.99</h2>
        </div>
        <div class="card">
            <img src="../T-shirt.jpg">
            <p>Graphic T-Shirt</p>
            <h2>$19.99</h2>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 UrbanDrip Clothing</p>
</footer>

</body>
</html>
