<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - UrbanDrip</title>
    <link rel="stylesheet" href="style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #f4f4f4;
}

header {
    background-color: black;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.hero {
    text-align: center;
    padding: 40px;
    background-color: grey;
    color: white;
}

.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 10px;
    text-align: center;
    border: 1px solid #ccc;
}

footer {
    text-align: center;
    padding: 10px;
    background-color: black;
    color: white;
}
section {
    background-color: white;
    border: 1px solid #ccc;
}
/* Contact section */
section {
    text-align: center;
    padding: 40px 20px;
    max-width: 600px;
    margin: auto;
}

section p {
    margin: 10px 0;
    line-height: 1.6;
}

section h2 {
    margin-bottom: 25px;
}

section p strong {
    display: inline-block;
    width: 80px;
}
/* Mobile responsiveness */
@media (max-width: 600px) {

    nav {
        display: flex;
        flex-direction: column;
    }

    nav a {
        margin: 5px 0;
    }

    .hero {
        padding: 30px 10px;
    }

    .hero h2 {
        font-size: 20px;
    }

    .products {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 90%;
    }

    section {
        padding: 25px 15px;
    }
}
</style>
<body>

<header>
    <h1>UrbanDrip Clothing</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>
<section>
    <h2>Contact Us</h2>

    <p><strong>Email:</strong>urbandrip@gmail.com</p>
    <p><strong>Phone:</strong>012 345 6789</p>

    <p>
        Follow us on social media to stay updated with new arrivals and specials.
    </p>
</section>

<footer>
    <p>© 2026 UrbanDrip Clothing</p>
</footer>

</body>
</html>
